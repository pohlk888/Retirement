<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wealth Projection - September 2033</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #5f6b7a;
      --line: #d9e2ef;
      --blue: #1f5f99;
      --blue-soft: #e8f2fb;
      --green-soft: #eaf7ef;
      --amber-soft: #fff4db;
      --red-soft: #fff0f0;
      --shadow: 0 10px 30px rgba(23, 32, 51, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 32px auto 56px;
    }

    header,
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: var(--shadow);
    }

    header {
      margin-bottom: 24px;
      padding: 28px 30px;
    }

    section {
      margin-top: 24px;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 3vw, 2.5rem);
      letter-spacing: 0;
    }

    h2 {
      margin: 0 0 16px;
      color: var(--blue);
      font-size: 1.35rem;
      letter-spacing: 0;
    }

    h3 {
      margin: 0 0 12px;
      color: #26364f;
      font-size: 1.05rem;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 16px;
      color: var(--muted);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      min-height: 38px;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      font-weight: 650;
    }

    .btn.primary {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
    }

    .btn.danger {
      border-color: #c84b4b;
      background: var(--red-soft);
      color: #8d2424;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 4px 0 18px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
    }

    .tab-button {
      min-height: 38px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--muted);
      cursor: pointer;
      font-weight: 700;
    }

    .tab-button.active {
      border-color: var(--blue);
      background: var(--blue-soft);
      color: var(--blue);
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    .editor-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .editor-card {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fbfdff;
      padding: 16px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 700;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 9px 10px;
    }

    textarea {
      min-height: 86px;
      resize: vertical;
    }

    .status {
      min-height: 22px;
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
    }

    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
      text-align: left;
    }

    th {
      background: var(--blue-soft);
      color: #183a5c;
      font-weight: 700;
      white-space: nowrap;
    }

    tr:last-child td {
      border-bottom: none;
    }

    td.amount,
    th.amount {
      text-align: right;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    tbody tr:nth-child(even) td {
      background: #fbfdff;
    }

    .cards {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-top: 18px;
    }

    .card {
      min-height: 132px;
      padding: 22px 24px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--green-soft);
    }

    .card strong {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 1rem;
      font-weight: 650;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .card span {
      color: var(--ink);
      font-size: 1.65rem;
      font-weight: 800;
    }

    .note {
      padding: 16px 18px;
      border-left: 5px solid #f2b84b;
      border-radius: 8px;
      background: var(--amber-soft);
      color: #4b3b16;
    }

    @media (max-width: 860px) {
      main {
        width: min(100% - 20px, 1180px);
        margin-top: 16px;
      }

      header,
      section {
        padding: 18px;
        border-radius: 10px;
      }

      .editor-grid,
      .field-grid {
        grid-template-columns: 1fr;
      }

      .card { padding: 18px; }
    }

    @media (max-width: 560px) {
      .card span { font-size: 1.45rem; }
    }

    @media print {
      body {
        background: #fff;
      }

      main {
        width: 100%;
        margin: 0;
      }

      header,
      section {
        box-shadow: none;
        break-inside: avoid;
      }

      .editor-section {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1 id="page-title"></h1>
      <p class="subtitle" id="page-subtitle"></p>
      <div class="toolbar">
        <button class="btn primary" id="save-button" type="button">Save Edits</button>
        <button class="btn" id="export-button" type="button">Export JSON for Codex Sync</button>
        <button class="btn" id="print-button" type="button">Print / PDF</button>
        <button class="btn danger" id="reset-button" type="button">Reset</button>
      </div>
      <p class="status" id="status"></p>
    </header>

    <section class="editor-section">
      <h2>📊 Editable Inputs</h2>
      <div class="tabs" id="tabs"></div>
      <div id="tab-panels"></div>
    </section>

    <section>
      <h2>📊 Projection Table</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Wealth Component</th>
              <th class="amount">Initial Capital - Jul 2026</th>
              <th class="amount">Projected Value - Sep 2033</th>
              <th>Growth Driver / Asset Details</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody id="projection-body"></tbody>
        </table>
      </div>
    </section>

    <section>
      <h2>📊 CPF Planning Notes</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Topic</th>
              <th class="amount">Estimate</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody id="cpf-body"></tbody>
        </table>
      </div>
    </section>

    <section>
      <h2>📊 Total Wealth Estimate - Sep 2033</h2>
      <p id="total-note"></p>
      <div class="cards" id="total-cards"></div>
    </section>

    <section>
      <h2>📊 Key Reminder</h2>
      <p class="note" id="key-reminder"></p>
    </section>
  </main>

  <script>
    const storageKey = "wealthProjectionSep2033Editable";

    const defaults = {
      title: "Wealth Projection - September 2033",
      subtitle: "Projected retirement wealth snapshot using current cash, CPF, SRS, insurance, and property assumptions.",
      totalNote: "Use CPF RA instead of CPF SA for the Sep 2033 snapshot to avoid double-counting.",
      reminder: "Do not count CPF SA and CPF RA together after age 55. The SA estimate is useful only as a pre-55 checkpoint before RA is formed.",
      projection: [
        {
          component: "UOB Cash",
          initial: "$250K",
          projected: "~$864.8K",
          driver: "Initial Capital + FD ($54.8K) + estimated savings of $80K/year x 7 years",
          notes: "Annual income ~$200K; expenditure including CPF/SRS reduction and top-ups ~$100K; target savings ~$80K/year"
        },
        {
          component: "AIA Life Insurance",
          initial: "$58.0K",
          projected: "~$71.3K",
          driver: "3% annual growth from Oct 2026",
          notes: "If surrendered on 23 Oct 2026, then compounded at steady 3% p.a."
        },
        {
          component: "SRS S&P 500 Investment",
          initial: "$0",
          projected: "$0",
          driver: "8% compounding assumption if deployed",
          notes: "Crash buying strategy; currently not deployed"
        },
        {
          component: "Cash S&P 500 Portfolio Investment",
          initial: "$0",
          projected: "$0",
          driver: "8% compounding assumption if deployed",
          notes: "Crash buying strategy; currently not deployed"
        },
        {
          component: "SRS Account",
          initial: "$102.0K",
          projected: "~$209.1K / ~$210K",
          driver: "Initial Capital + $15.3K/year x 7 years",
          notes: "Before any S&P 500 investment gains"
        },
        {
          component: "CPF OA Account",
          initial: "$77.0K",
          projected: "~$336.0K",
          driver: "Salary CPF contributions, OA interest, and assumed MA overflow to OA",
          notes: "Estimated OA at Sep 2033, age 56"
        },
        {
          component: "CPF SA Account",
          initial: "$302.0K",
          projected: "~$467.0K by Sep 2032",
          driver: "Salary CPF contributions and 4% SA interest",
          notes: "SA closes when RA is created at age 55; do not count together with RA after age 55"
        },
        {
          component: "CPF RA Account - after age 55",
          initial: "NA",
          projected: "~$542.0K to ~$575.0K",
          driver: "RA formed at Oct 2032, then grows with contributions and interest",
          notes: "Estimated ERS target at age 55 is ~$542K; estimated RA by Sep 2033 is ~$575K"
        },
        {
          component: "CPF MA",
          initial: "$79.0K",
          projected: "~$111.2K",
          driver: "$79K compounded at 5% p.a. for 7 years",
          notes: "Used as inflation-style projection; actual MA mechanics may differ"
        },
        {
          component: "Condo Asset",
          initial: "$1.3M",
          projected: "~$1.5M",
          driver: "Property value estimate",
          notes: "As of Jul 2026"
        }
      ],
      cpf: [
        {
          topic: "Estimated ERS / RA target at age 55 in Oct 2032",
          estimate: "~$542K",
          notes: "Planning estimate"
        },
        {
          topic: "Estimated SA at Sep 2032",
          estimate: "~$467K",
          notes: "Before SA closure and RA formation"
        },
        {
          topic: "Estimated shortfall to meet $542K ERS",
          estimate: "~$75K",
          notes: "Can be funded from OA or cash"
        },
        {
          topic: "Estimated RA by Sep 2033",
          estimate: "~$575K",
          notes: "Includes work contribution and interest after RA creation"
        },
        {
          topic: "Estimated top-up amount from age 56 to 70",
          estimate: "~$360K-$370K",
          notes: "To keep topping up RA/ERS limit annually"
        },
        {
          topic: "Estimated total RA funding need after age 55",
          estimate: "~$435K",
          notes: "~$75K initial shortfall + ~$360K later top-ups"
        }
      ],
      totals: [
        {
          label: "Estimate Wealth (Cash+Insurance+Investment-S&P500+SRS+CPF_RA_OA) - (CPF_MA + $75K to top CPF_RA at 55)",
          value: "~$1.84M"
        },
        {
          label: "Estimate Wealth with Asset",
          value: "~$3.34M"
        }
      ]
    };

    let state = loadState();

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function loadState() {
      try {
        const saved = localStorage.getItem(storageKey);
        return saved ? mergeState(clone(defaults), JSON.parse(saved)) : clone(defaults);
      } catch (error) {
        return clone(defaults);
      }
    }

    function mergeState(base, saved) {
      Object.keys(base).forEach((key) => {
        if (Array.isArray(base[key]) && Array.isArray(saved[key])) {
          base[key] = saved[key];
        } else if (typeof base[key] === "object" && saved[key]) {
          base[key] = { ...base[key], ...saved[key] };
        } else if (saved[key] !== undefined) {
          base[key] = saved[key];
        }
      });
      return base;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function setStatus(message) {
      document.getElementById("status").textContent = message;
    }

    function saveState(showMessage = true) {
      recalculateState();
      localStorage.setItem(storageKey, JSON.stringify(state));
      if (showMessage) {
        setStatus("Saved in this browser. Use Export JSON for Codex Sync when you want Codex to apply website edits locally.");
      }
    }

    function buildEditor() {
      const tabs = [
        { id: "summary", label: "Summary" },
        { id: "projection", label: "Projection Inputs" },
        { id: "cpf", label: "CPF Inputs" },
        { id: "totals", label: "Total Cards" },
        { id: "reminder", label: "Reminder" }
      ];

      document.getElementById("tabs").innerHTML = tabs.map((tab, index) => `
        <button class="tab-button ${index === 0 ? "active" : ""}" data-tab="${tab.id}" type="button">${tab.label}</button>
      `).join("");

      document.getElementById("tab-panels").innerHTML = `
        <div class="tab-panel active" id="panel-summary">
          <div class="editor-grid">
            <div class="editor-card">
              <h3>Page Header</h3>
              <div class="field-grid">
                ${field("Title", "title", state.title, "input", "full")}
                ${field("Subtitle", "subtitle", state.subtitle, "textarea", "full")}
              </div>
            </div>
            <div class="editor-card">
              <h3>Total Section Note</h3>
              <div class="field-grid">
                ${field("Note", "totalNote", state.totalNote, "textarea", "full")}
              </div>
            </div>
          </div>
        </div>
        <div class="tab-panel" id="panel-projection">
          <div class="editor-grid">
            ${state.projection.map((row, index) => projectionEditor(row, index)).join("")}
          </div>
        </div>
        <div class="tab-panel" id="panel-cpf">
          <div class="editor-grid">
            ${state.cpf.map((row, index) => cpfEditor(row, index)).join("")}
          </div>
        </div>
        <div class="tab-panel" id="panel-totals">
          <div class="editor-grid">
            ${state.totals.map((row, index) => totalEditor(row, index)).join("")}
          </div>
        </div>
        <div class="tab-panel" id="panel-reminder">
          <div class="editor-card">
            <h3>Key Reminder</h3>
            <div class="field-grid">
              ${field("Reminder", "reminder", state.reminder, "textarea", "full")}
            </div>
          </div>
        </div>
      `;

      document.querySelectorAll(".tab-button").forEach((button) => {
        button.addEventListener("click", () => setActiveTab(button.dataset.tab));
      });

      document.querySelectorAll("[data-bind]").forEach((input) => {
        input.addEventListener("input", () => {
          setByPath(input.dataset.bind, input.value);
          recalculateState();
          syncBoundInputs();
          renderPreview();
          saveState(false);
          setStatus("Editing saved automatically in this browser.");
        });
      });
    }

    function field(label, path, value, type = "input", size = "") {
      const control = type === "textarea"
        ? `<textarea data-bind="${escapeHtml(path)}">${escapeHtml(value)}</textarea>`
        : `<input data-bind="${escapeHtml(path)}" value="${escapeHtml(value)}">`;

      return `
        <div class="field ${size}">
          <label>${escapeHtml(label)}</label>
          ${control}
        </div>
      `;
    }

    function projectionEditor(row, index) {
      return `
        <div class="editor-card">
          <h3>${escapeHtml(row.component || `Projection ${index + 1}`)}</h3>
          <div class="field-grid">
            ${field("Wealth Component", `projection.${index}.component`, row.component)}
            ${field("Initial Capital", `projection.${index}.initial`, row.initial)}
            ${field("Projected Value", `projection.${index}.projected`, row.projected)}
            ${field("Growth Driver / Asset Details", `projection.${index}.driver`, row.driver, "textarea", "full")}
            ${field("Notes", `projection.${index}.notes`, row.notes, "textarea", "full")}
          </div>
        </div>
      `;
    }

    function cpfEditor(row, index) {
      return `
        <div class="editor-card">
          <h3>${escapeHtml(row.topic || `CPF ${index + 1}`)}</h3>
          <div class="field-grid">
            ${field("Topic", `cpf.${index}.topic`, row.topic, "textarea", "full")}
            ${field("Estimate", `cpf.${index}.estimate`, row.estimate)}
            ${field("Notes", `cpf.${index}.notes`, row.notes, "textarea", "full")}
          </div>
        </div>
      `;
    }

    function totalEditor(row, index) {
      return `
        <div class="editor-card">
          <h3>${escapeHtml(row.label || `Total ${index + 1}`)}</h3>
          <div class="field-grid">
            ${field("Card Label", `totals.${index}.label`, row.label, "textarea", "full")}
            ${field("Card Value", `totals.${index}.value`, row.value)}
          </div>
        </div>
      `;
    }

    function setActiveTab(id) {
      document.querySelectorAll(".tab-button").forEach((button) => {
        button.classList.toggle("active", button.dataset.tab === id);
      });
      document.querySelectorAll(".tab-panel").forEach((panel) => {
        panel.classList.toggle("active", panel.id === `panel-${id}`);
      });
    }

    function setByPath(path, value) {
      const keys = path.split(".");
      let target = state;
      keys.slice(0, -1).forEach((key) => {
        target = target[key];
      });
      target[keys[keys.length - 1]] = value;
    }

    function getByPath(path) {
      return path.split(".").reduce((target, key) => {
        if (target === undefined || target === null) return "";
        return target[key];
      }, state);
    }

    function syncBoundInputs() {
      document.querySelectorAll("[data-bind]").forEach((input) => {
        const value = getByPath(input.dataset.bind);
        if (input.value !== String(value ?? "")) input.value = value ?? "";
      });
    }

    function formatMoney(value, compact = false) {
      if (compact && Math.abs(value) >= 1000000) return "~$" + (value / 1000000).toLocaleString("en-US", { maximumFractionDigits: 2 }) + "M";
      if (compact && Math.abs(value) >= 1000) return "~$" + (value / 1000).toLocaleString("en-US", { maximumFractionDigits: 2 }) + "K";
      return "$" + value.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function parseCompactMoney(value) {
      const text = String(value ?? "").replace(/[$,~]/g, "").trim();
      const match = text.match(/(-?\d+(?:\.\d+)?)\s*([kKmM])?/);
      if (!match) return null;
      const multiplier = /m/i.test(match[2] || "") ? 1000000 : /k/i.test(match[2] || "") ? 1000 : 1;
      return Number(match[1]) * multiplier;
    }

    function firstCompactMoney(value) {
      return parseCompactMoney(value);
    }

    function evaluateCalculation(value) {
      const raw = String(value ?? "").trim();
      if (/^~/.test(raw) && /-/.test(raw)) return null;
      if (!/[+\-*/×xX()%]/.test(raw) || !/[0-9]/.test(raw)) return null;
      const expression = raw
        .replace(/[$,~]/g, "")
        .replace(/(\d+(?:\.\d+)?)\s*%/g, "($1/100)")
        .replace(/(\d+(?:\.\d+)?)\s*[kK]\b/g, "($1*1000)")
        .replace(/(\d+(?:\.\d+)?)\s*[mM]\b/g, "($1*1000000)")
        .replace(/[×xX]/g, "*")
        .trim();
      if (/[^0-9+\-*/().\s]/.test(expression)) return null;
      try {
        const result = Function(`"use strict"; return (${expression});`)();
        return Number.isFinite(result) ? result : null;
      } catch (error) {
        return null;
      }
    }

    function formatCalculatedValue(value, sourceText, currentText = "") {
      return formatMoney(value, /[kKmM]/.test(String(sourceText)) || /[kKmM]/.test(String(currentText)));
    }

    function projectedFromUobDriver(row) {
      if (!/^UOB Cash(?: \+ FD)?$/i.test(String(row.component ?? ""))) return null;
      row.component = "UOB Cash";

      const initial = parseCompactMoney(row.initial);
      const driver = String(row.driver ?? "");
      const fdMatch = driver.match(/FD\s*\(([^)]+)\)/i);
      const savingsMatch = driver.match(/savings(?:\s+of)?\s*([$~]?\d+(?:\.\d+)?\s*[kKmM]?)/i);
      const yearsMatch = driver.match(/[x×*]\s*(\d+(?:\.\d+)?)\s*years?/i);

      if (initial === null || !fdMatch || !savingsMatch || !yearsMatch) return null;

      const fd = parseCompactMoney(fdMatch[1]);
      const annualSavings = parseCompactMoney(savingsMatch[1]);
      const years = Number(yearsMatch[1]);
      if (fd === null || annualSavings === null || !Number.isFinite(years)) return null;

      return initial + fd + annualSavings * years;
    }

    function projectedFromAnnualTopUpDriver(row) {
      if (!/^SRS Account$/i.test(String(row.component ?? ""))) return null;

      const initial = parseCompactMoney(row.initial);
      const driver = String(row.driver ?? "");
      const annualMatch = driver.match(/Initial Capital\s*\+\s*([$~]?\d+(?:\.\d+)?\s*[kKmM]?)\s*\/\s*year/i);
      const yearsMatch = driver.match(/[x×*]\s*(\d+(?:\.\d+)?)\s*years?/i);

      if (initial === null || !annualMatch || !yearsMatch) return null;

      const annualTopUp = parseCompactMoney(annualMatch[1]);
      const years = Number(yearsMatch[1]);
      if (annualTopUp === null || !Number.isFinite(years)) return null;

      return initial + annualTopUp * years;
    }

    function projectionValue(componentName) {
      const row = state.projection.find((item) => item.component === componentName);
      return row ? firstCompactMoney(row.projected) : 0;
    }

    function normalizeTotalCards() {
      const label = "Estimate Wealth (Cash+Insurance+Investment-S&P500+SRS+CPF_RA_OA) - (CPF_MA + $75K to top CPF_RA at 55)";
      const estimated =
        projectionValue("UOB Cash") +
        projectionValue("AIA Life Insurance") +
        projectionValue("SRS S&P 500 Investment") +
        projectionValue("Cash S&P 500 Portfolio Investment") +
        projectionValue("SRS Account") +
        projectionValue("CPF RA Account - after age 55") +
        projectionValue("CPF OA Account") -
        projectionValue("CPF MA") -
        75000;
      const estimatedWithAsset = estimated + projectionValue("Condo Asset");

      state.totals = [
        {
          label,
          value: formatMoney(estimated, true)
        },
        {
          label: "Estimate Wealth with Asset",
          value: formatMoney(estimatedWithAsset, true)
        }
      ];
    }

    function recalculateState() {
      state.projection.forEach((row) => {
        const initial = evaluateCalculation(row.initial);
        if (initial !== null) row.initial = formatCalculatedValue(initial, row.initial, row.initial);

        const projected = evaluateCalculation(row.projected);
        if (projected !== null) row.projected = formatCalculatedValue(projected, row.projected, row.projected);

        const driver = evaluateCalculation(row.driver);
        if (driver !== null) row.projected = formatCalculatedValue(driver, row.driver, row.projected);

        const uobProjected = projectedFromUobDriver(row);
        if (uobProjected !== null) row.projected = formatMoney(uobProjected, true);

        const annualTopUpProjected = projectedFromAnnualTopUpDriver(row);
        if (annualTopUpProjected !== null) row.projected = formatMoney(annualTopUpProjected, true);
      });

      state.cpf.forEach((row) => {
        const estimate = evaluateCalculation(row.estimate);
        if (estimate !== null) row.estimate = formatCalculatedValue(estimate, row.estimate, row.estimate);
      });

      state.totals.forEach((row) => {
        const value = evaluateCalculation(row.value);
        if (value !== null) row.value = formatCalculatedValue(value, row.value, row.value);
      });

      normalizeTotalCards();
    }

    function renderPreview() {
      recalculateState();
      document.getElementById("page-title").textContent = state.title;
      document.getElementById("page-subtitle").textContent = state.subtitle;
      document.getElementById("total-note").textContent = state.totalNote;
      document.getElementById("key-reminder").textContent = state.reminder;

      document.getElementById("projection-body").innerHTML = state.projection.map((row) => `
        <tr>
          <td>${escapeHtml(row.component)}</td>
          <td class="amount">${escapeHtml(row.initial)}</td>
          <td class="amount">${escapeHtml(row.projected)}</td>
          <td>${escapeHtml(row.driver)}</td>
          <td>${escapeHtml(row.notes)}</td>
        </tr>
      `).join("");

      document.getElementById("cpf-body").innerHTML = state.cpf.map((row) => `
        <tr>
          <td>${escapeHtml(row.topic)}</td>
          <td class="amount">${escapeHtml(row.estimate)}</td>
          <td>${escapeHtml(row.notes)}</td>
        </tr>
      `).join("");

      document.getElementById("total-cards").innerHTML = state.totals.map((row) => `
        <div class="card">
          <strong>${escapeHtml(row.label)}</strong>
          <span>${escapeHtml(row.value)}</span>
        </div>
      `).join("");
    }

    function exportJson() {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = "wealth_projection_sep_2033_inputs.json";
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
      setStatus("Exported JSON backup.");
    }

    function resetState() {
      if (!confirm("Reset this page back to the original wealth projection values?")) {
        return;
      }
      state = clone(defaults);
      localStorage.removeItem(storageKey);
      buildEditor();
      renderPreview();
      setStatus("Reset to original values.");
    }

    document.getElementById("save-button").addEventListener("click", () => saveState(true));
    document.getElementById("export-button").addEventListener("click", exportJson);
    document.getElementById("print-button").addEventListener("click", () => window.print());
    document.getElementById("reset-button").addEventListener("click", resetState);

    recalculateState();
    buildEditor();
    renderPreview();
    setStatus("Changes save automatically in this browser.");
  </script>
</body>
</html>
